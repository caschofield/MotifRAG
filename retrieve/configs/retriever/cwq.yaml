task: 'retriever'

env:
  num_threads: 16
  seed: 42

dataset:
  name: 'cwq'
  text_encoder_name: 'gte-large-en-v1.5'

retriever:
  topic_pe: true
  hidden_dim: 256
  DDE_kwargs:
    num_rounds: 2
    num_reverse_rounds: 2

motif:
  enabled: true
  backend: 'python'
  orca_path: ''
  top_k_tokens: 4
  motif_emb_dim: 64
  vocab_size: 17
  query_cross_attn_enabled: false

loss:
  motif_kl_weight: 0.1

optimizer:
  lr: 1e-3

eval:
  k_list: '100'

train:
  num_epochs: 10000
  patience: 10
  save_prefix: 'cwq'
